<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leoaragão.1 — IA, Tecnologia &amp; Negócios</title>

    <!-- Preconnects — fire before JS loads -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- UnicornStudio SDK — preloaded so download is done by the time React mounts -->
    <link
      rel="preload"
      as="script"
      href="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v2.1.12/dist/unicornStudio.umd.js"
      crossorigin
    />

    <!-- Funnel Display — non-blocking (preload as style, swap to stylesheet on load) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300;400;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300;400;600;700&display=swap"
      />
    </noscript>

    <style>
      html, body { height: 100%; margin: 0; }
      #root { height: 100%; }
      body { font-family: 'Funnel Display', system-ui, sans-serif; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
